services:
  - type: web
    name: 9look-worker
    env: docker
    dockerfilePath: ./Dockerfile
    plan: free
    envVars:
      - key: RAILWAY_URL
        value: https://9look-production.up.railway.app
      - key: WORKER_SECRET
        sync: false
      - key: PORT
        value: 10000
      - key: PLAYWRIGHT_HEADLESS
        value: "true"